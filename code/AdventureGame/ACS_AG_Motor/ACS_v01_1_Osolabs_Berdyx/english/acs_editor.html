  allInp.addEventListener('change', () => {
    const file = allInp.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        for (const key of ['screens', 'actions', 'sensors', 'dashboard', 'puzzles']) {
          if (data[key]) DB[key] = data[key];
        }
        setStatus(importStatus, '✔ Loaded all data successfully!');
      } catch(e) {
        setStatus(importStatus, `⚠ Error: ${e.message}`, true);
      }
    };
    reader.readAsText(file);
  });
  allRow.appendChild(allInp);
  container.appendChild(allRow);
  container.appendChild(importStatus);
}

// ═══════════════════════════════════════════════════════════════
//  MAP VIEW — screens as draggable nodes with directional arrows
// ═══════════════════════════════════════════════════════════════
function buildMapTab() {
  const container = document.getElementById('tab-map');
  container.innerHTML = '';
  container.appendChild(el('h2', null, '🗺️ Adventure Map'));
  container.appendChild(el('hr', { className: 'accent' }));

  const screens = DB.screens;
  if (!Object.keys(screens).length) {
    container.appendChild(el('p', { style: 'color:var(--red)' }, 'No screens found. Create some screens first.'));
    return;
  }

  container.appendChild(el('p', { style: 'font-size:10px;color:var(--accent-light);margin:4px 0' },
    'Drag rooms to rearrange • Scroll to zoom • Shows screens with action connections'));

  const resetBtn = el('button', { className: 'btn btn-sm', style: 'margin-bottom:8px' }, '⟳ Reset Layout');
  container.appendChild(resetBtn);

  const canvasWrap = el('div', { className: 'map-container', style: 'height:600px;position:relative;overflow:hidden;' });
  const canvas = el('canvas', { width: '2000', height: '2000' });
  canvasWrap.appendChild(canvas);
  container.appendChild(canvasWrap);

  const ctx = canvas.getContext('2d');

  // Build data
  const nameToRec = {};
  Object.values(screens).forEach(r => { nameToRec[r.Name || r.ID] = r; });
  const allNames = Object.values(screens).sort((a,b) => parseInt(a.ID)-parseInt(b.ID)).map(r => r.Name || r.ID);

  const actionByName = {};
  Object.values(DB.actions).forEach(a => { if (a.Name) actionByName[a.Name.trim()] = a; });

  const idToScreenName = {};
  Object.values(screens).forEach(r => { idToScreenName[String(r.ID)] = r.Name || r.ID; });

  // Get action labels for a screen
  function getActionLabels(rec) {
    const labels = [];
    for (let i = 1; i <= 4; i++) {
      const aname = (rec['Action' + i] || '').trim();
      if (aname) labels.push(aname);
    }
    return labels;
  }

  // Build edges from actions that have ScreenID set
  function buildEdges() {
    const edges = [];
    for (const [nm, rec] of Object.entries(nameToRec)) {
      for (let i = 1; i <= 4; i++) {
        const aname = (rec['Action' + i] || '').trim();
        if (!aname) continue;
        const arec = actionByName[aname];
        if (!arec) continue;
        const dstId = parseInt(arec.ScreenID);
        if (isNaN(dstId) || dstId === 255) continue;
        const dstName = idToScreenName[String(dstId)];
        if (dstName && dstName !== nm) {
          edges.push({ src: nm, dst: dstName, action: aname });
        }
      }
    }
    return edges;
  }

  const BOX_W = 160, BOX_H = 50, GAP_X = 100, GAP_Y = 90;
  const STEP_X = BOX_W + GAP_X, STEP_Y = BOX_H + GAP_Y;
  const positions = {}; // name -> {x, y}

  function autoLayout() {
    const cols = Math.max(1, Math.ceil(Math.sqrt(allNames.length)));
    allNames.forEach((nm, i) => {
      const col = i % cols, row = Math.floor(i / cols);
      positions[nm] = { x: 80 + col * STEP_X, y: 80 + row * STEP_Y };
    });
  }
  autoLayout();

  let scale = 1, panX = 0, panY = 0;

  function draw() {
    ctx.setTransform(1,0,0,1,0,0);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.setTransform(scale, 0, 0, scale, panX, panY);

    const edges = buildEdges();

    // Draw edges
    const edgeGroups = {};
    edges.forEach(e => {
      const key = e.src + '→' + e.dst;
      if (!edgeGroups[key]) edgeGroups[key] = [];
      edgeGroups[key].push(e.action);
    });

    for (const [key, actions] of Object.entries(edgeGroups)) {
      const [src, dst] = key.split('→');
      if (!positions[src] || !positions[dst]) continue;
      const sp = positions[src], dp = positions[dst];
      const sx = sp.x + BOX_W / 2, sy = sp.y + BOX_H / 2;
      const dx = dp.x + BOX_W / 2, dy = dp.y + BOX_H / 2;

      // Check if bidirectional
      const revKey = dst + '→' + src;
      const isBidir = revKey in edgeGroups;
      let offsetY = 0;
      if (isBidir) offsetY = key < revKey ? -6 : 6;

      ctx.beginPath();
      ctx.moveTo(sx, sy + offsetY);
      ctx.lineTo(dx, dy + offsetY);
      ctx.strokeStyle = '#6EC6FF';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Arrow head
      const angle = Math.atan2(dy + offsetY - sy - offsetY, dx - sx);
      const hl = 12;
      ctx.beginPath();
      ctx.moveTo(dx - 4 * Math.cos(angle), dy + offsetY - 4 * Math.sin(angle));
      ctx.lineTo(dx - hl * Math.cos(angle - 0.3), dy + offsetY - hl * Math.sin(angle - 0.3));
      ctx.lineTo(dx - hl * Math.cos(angle + 0.3), dy + offsetY - hl * Math.sin(angle + 0.3));
      ctx.closePath();
      ctx.fillStyle = '#6EC6FF';
      ctx.fill();

      // Label at midpoint
      const mx = (sx + dx) / 2, my = (sy + dy) / 2 + offsetY - 10;
      ctx.font = '9px Share Tech Mono, Courier New, monospace';
      ctx.fillStyle = '#FBBF24';
      ctx.textAlign = 'center';
      ctx.fillText(actions.join(' / ').slice(0, 30), mx, my);
    }

    // Draw boxes
    allNames.forEach(nm => {
      const p = positions[nm];
      if (!p) return;
      const rec = nameToRec[nm];
      const actLabels = getActionLabels(rec);
      const actAreaH = actLabels.length * 16 + 4;
      const fullH = BOX_H + actAreaH;

      // Box bg
      ctx.fillStyle = '#16213e';
      ctx.strokeStyle = '#2a3a5c';
      ctx.lineWidth = 2;
      ctx.fillRect(p.x, p.y, BOX_W, fullH);
      ctx.strokeRect(p.x, p.y, BOX_W, fullH);

      // Header
      ctx.fillStyle = '#BAE6FD';
      ctx.font = 'bold 11px Share Tech Mono, Courier New, monospace';
      ctx.textAlign = 'center';
      const display = nm.length <= 18 ? nm : nm.slice(0, 17) + '…';
      ctx.fillText(display, p.x + BOX_W / 2, p.y + BOX_H / 2 + 4);

      // ID badge
      ctx.font = '8px Share Tech Mono, Courier New, monospace';
      ctx.fillStyle = '#34D399';
      ctx.textAlign = 'left';
      ctx.fillText(`[${rec.ID}]`, p.x + 4, p.y + 14);

      // Flags
      let flags = '';
      if (parseInt(rec.IsSecretScreen)) flags += '🔑';
      if (parseInt(rec.IsEndScreen)) flags += '🏁';
      if (flags) {
        ctx.textAlign = 'right';
        ctx.fillText(flags, p.x + BOX_W - 4, p.y + 14);
      }

      // Divider
      if (actLabels.length) {
        ctx.beginPath();
        ctx.moveTo(p.x + 2, p.y + BOX_H);
        ctx.lineTo(p.x + BOX_W - 2, p.y + BOX_H);
        ctx.strokeStyle = '#2a3a5c';
        ctx.lineWidth = 1;
        ctx.stroke();
      }

      // Action labels
      ctx.font = '9px Share Tech Mono, Courier New, monospace';
      ctx.fillStyle = '#C084FC';
      ctx.textAlign = 'center';
      actLabels.forEach((lbl, i) => {
        const y = p.y + BOX_H + 14 + i * 16;
        const d = lbl.length <= 20 ? lbl : lbl.slice(0, 19) + '…';
        ctx.fillText(d, p.x + BOX_W / 2, y);
      });
    });
  }

  draw();
  resetBtn.addEventListener('click', () => { autoLayout(); scale = 1; panX = 0; panY = 0; draw(); });

  // Drag
  let dragName = null, dragOx = 0, dragOy = 0;
  function canvasCoords(e) {
    const r = canvas.getBoundingClientRect();
    return { x: (e.clientX - r.left - panX) / scale, y: (e.clientY - r.top - panY) / scale };
  }

  canvas.addEventListener('mousedown', e => {
    const c = canvasCoords(e);
    for (const nm of allNames) {
      const p = positions[nm];
      if (!p) continue;
      const rec = nameToRec[nm];
      const actLabels = getActionLabels(rec);
      const fullH = BOX_H + actLabels.length * 16 + 4;
      if (c.x >= p.x && c.x <= p.x + BOX_W && c.y >= p.y && c.y <= p.y + fullH) {
        dragName = nm; dragOx = c.x; dragOy = c.y;
        return;
      }
    }
    // Pan mode
    dragName = '__PAN__'; dragOx = e.clientX; dragOy = e.clientY;
  });

  canvas.addEventListener('mousemove', e => {
    if (!dragName) return;
    if (dragName === '__PAN__') {
      panX += e.clientX - dragOx; panY += e.clientY - dragOy;
      dragOx = e.clientX; dragOy = e.clientY;
    } else {
      const c = canvasCoords(e);
      positions[dragName].x += c.x - dragOx;
      positions[dragName].y += c.y - dragOy;
      dragOx = c.x; dragOy = c.y;
    }
    draw();
  });

  canvas.addEventListener('mouseup', () => { dragName = null; });
  canvas.addEventListener('mouseleave', () => { dragName = null; });

  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.1 : 0.9;
    const r = canvas.getBoundingClientRect();
    const mx = e.clientX - r.left, my = e.clientY - r.top;
    panX = mx - (mx - panX) * factor;
    panY = my - (my - panY) * factor;
    scale *= factor;
    draw();
  }, { passive: false });
}


// ═══════════════════════════════════════════════════════════════
//  MAP ACTIONS VIEW — screens as nodes with action details,
//  sensor badges, and transition arrows
// ═══════════════════════════════════════════════════════════════
function buildMapActionsTab() {
  const container = document.getElementById('tab-mapactions');
  container.innerHTML = '';
  container.appendChild(el('h2', null, '🔀 Map Actions — Screens · Actions · Sensors'));
  container.appendChild(el('hr', { className: 'accent' }));

  const screens = DB.screens;
  const actions = DB.actions;
  const sensors = DB.sensors;

  if (!Object.keys(screens).length) {
    container.appendChild(el('p', { style: 'color:var(--red)' }, 'No screens found. Create some first.'));
    return;
  }

  // Legend
  const legend = el('div', { style: 'display:flex;gap:12px;flex-wrap:wrap;margin:4px 0 8px;font-size:9px;' });
  [['#BAE6FD','Screen header'],['#6EC6FF','→ transition'],['#34D399','Sensor ON'],['#ff6b6b','Sensor OFF'],['#4a5580','No sensor'],['#FBBF24','→ Dest. screen']].forEach(([c,l]) => {
    legend.appendChild(el('span', { className: 'legend-item', style: `color:${c}` }, [el('span', { className: 'legend-dot', style: `background:${c}` }), ` ${l}`]));
  });
  container.appendChild(legend);
  container.appendChild(el('p', { style: 'font-size:10px;color:var(--accent-light);margin:0 0 8px' },
    'Drag nodes • Scroll to zoom • Pan by dragging empty space'));

  const resetBtn = el('button', { className: 'btn btn-sm', style: 'margin-bottom:8px' }, '⟳ Reset Layout');
  container.appendChild(resetBtn);

  const canvasWrap = el('div', { className: 'map-container', style: 'height:650px;position:relative;overflow:hidden;' });
  const canvas = el('canvas', { width: '3000', height: '3000' });
  canvasWrap.appendChild(canvas);
  container.appendChild(canvasWrap);

  const ctx = canvas.getContext('2d');

  // Lookups
  const idToScreenName = {};
  Object.values(screens).forEach(r => { idToScreenName[String(r.ID)] = r.Name || r.ID; });
  const screenNameToId = {};
  Object.values(screens).forEach(r => { screenNameToId[r.Name || r.ID] = String(r.ID); });
  const sensorById = {};
  Object.values(sensors).forEach(r => { sensorById[String(r.ID)] = r; });
  const actionByName = {};
  Object.values(actions).forEach(a => { if (a.Name) actionByName[a.Name.trim()] = a; });

  const allScreenNames = Object.values(screens).sort((a,b) => parseInt(a.ID)-parseInt(b.ID)).map(r => r.Name || r.ID);

  // Per-screen action rows
  const screenActionRows = {};
  const edges = []; // {src, dst, action}

  for (const rec of Object.values(screens)) {
    const srcName = rec.Name || rec.ID;
    const rows = [];
    for (let i = 1; i <= 4; i++) {
      const aname = (rec['Action' + i] || '').trim();
      if (!aname) continue;
      const arec = actionByName[aname] || {};
      let dstId = parseInt(arec.ScreenID); if (isNaN(dstId)) dstId = 255;
      const dstName = dstId !== 255 ? idToScreenName[String(dstId)] : null;
      if (dstName && dstName !== srcName) edges.push({ src: srcName, dst: dstName, action: aname });

      let sid = parseInt(arec.SensorID); if (isNaN(sid)) sid = 255;
      const sensorRec = sid !== 255 ? sensorById[String(sid)] : null;
      const sensorName = sensorRec ? (sensorRec.Name || `S${sid}`) : null;
      const sensorActive = !!arec.SensorActive;

      rows.push({ name: aname, dstName, sensorName, sensorActive });
    }
    screenActionRows[srcName] = rows;
  }

  // Layout
  const BOX_W = 300, HDR_H = 36, ROW_H = 22, ROW_PAD = 6;
  const GAP_X = 220, GAP_Y = 80;
  const positions = {};

  function nodeHeight(nm) {
    return HDR_H + (screenActionRows[nm] || []).length * ROW_H + ROW_PAD;
  }

  function autoLayout() {
    const cols = Math.max(1, Math.ceil(Math.sqrt(allScreenNames.length)));
    const rowHeights = {};
    allScreenNames.forEach((nm, i) => {
      const row = Math.floor(i / cols);
      rowHeights[row] = Math.max(rowHeights[row] || 0, nodeHeight(nm));
    });
    const colX = Array.from({length: cols}, (_, c) => 60 + c * (BOX_W + GAP_X));
    const rowY = [];
    let y = 60;
    for (let r = 0; r <= Math.max(...Object.keys(rowHeights).map(Number)); r++) {
      rowY.push(y);
      y += (rowHeights[r] || 80) + GAP_Y;
    }
    allScreenNames.forEach((nm, i) => {
      const col = i % cols, row = Math.floor(i / cols);
      positions[nm] = { x: colX[col], y: rowY[row] || 60 };
    });
  }
  autoLayout();

  let scale = 1, panX = 0, panY = 0;

  // Colors
  const C = {
    hdrBg: '#16213e', hdrOut: '#2a3a5c', hdrTxt: '#BAE6FD',
    bodyBg: '#0f1629', div: '#2a3a5c',
    actTxt: '#8888aa', dstTxt: '#FBBF24',
    senOn: '#34D399', senOff: '#ff6b6b', senNone: '#4a5580',
    arrow: '#6EC6FF', arrLbl: '#FBBF24',
  };

  function draw() {
    ctx.setTransform(1,0,0,1,0,0);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.setTransform(scale, 0, 0, scale, panX, panY);

    // Edges
    const edgeGroups = {};
    edges.forEach(e => {
      const key = e.src + '|' + e.dst;
      if (!edgeGroups[key]) edgeGroups[key] = [];
      edgeGroups[key].push(e.action);
    });

    for (const [key, anames] of Object.entries(edgeGroups)) {
      const [src, dst] = key.split('|');
      if (!positions[src] || !positions[dst]) continue;
      const sp = positions[src], dp = positions[dst];
      const sh = nodeHeight(src), dh = nodeHeight(dst);

      let ax1 = sp.x + BOX_W, ay1 = sp.y + sh / 2;
      let ax2 = dp.x, ay2 = dp.y + dh / 2;

      const revKey = dst + '|' + src;
      const isBidir = revKey in edgeGroups;
      if (isBidir) {
        const off = key < revKey ? -8 : 8;
        ay1 += off; ay2 += off;
      }

      // Bezier curve
      const cx1 = ax1 + GAP_X * 0.4, cy1 = ay1;
      const cx2 = ax2 - GAP_X * 0.4, cy2 = ay2;

      ctx.beginPath();
      ctx.moveTo(ax1, ay1);
      ctx.bezierCurveTo(cx1, cy1, cx2, cy2, ax2, ay2);
      ctx.strokeStyle = C.arrow;
      ctx.lineWidth = 2;
      ctx.stroke();

      // Arrowhead
      const t = 0.95;
      const mt = 1 - t;
      const tx = mt*mt*mt*ax1 + 3*mt*mt*t*cx1 + 3*mt*t*t*cx2 + t*t*t*ax2;
      const ty = mt*mt*mt*ay1 + 3*mt*mt*t*cy1 + 3*mt*t*t*cy2 + t*t*t*ay2;
      const angle = Math.atan2(ay2 - ty, ax2 - tx);
      ctx.beginPath();
      ctx.moveTo(ax2, ay2);
      ctx.lineTo(ax2 - 12*Math.cos(angle-0.3), ay2 - 12*Math.sin(angle-0.3));
      ctx.lineTo(ax2 - 12*Math.cos(angle+0.3), ay2 - 12*Math.sin(angle+0.3));
      ctx.closePath();
      ctx.fillStyle = C.arrow;
      ctx.fill();

      // Label
      const mx = (ax1+ax2)/2, my = (ay1+ay2)/2 - 8;
      ctx.font = '8px Share Tech Mono, Courier New, monospace';
      ctx.fillStyle = C.arrLbl;
      ctx.textAlign = 'center';
      ctx.fillText(anames.join(' / ').slice(0, 40), mx, my);
    }

    // Nodes
    allScreenNames.forEach(nm => {
      const p = positions[nm];
      if (!p) return;
      const nh = nodeHeight(nm);
      const rows = screenActionRows[nm] || [];
      const sid = screenNameToId[nm] || '?';

      // Header bg
      ctx.fillStyle = C.hdrBg;
      ctx.strokeStyle = C.hdrOut;
      ctx.lineWidth = 2;
      ctx.fillRect(p.x, p.y, BOX_W, HDR_H);
      ctx.strokeRect(p.x, p.y, BOX_W, HDR_H);

      // Header text
      ctx.fillStyle = C.hdrTxt;
      ctx.font = 'bold 11px Share Tech Mono, Courier New, monospace';
      ctx.textAlign = 'left';
      const disp = nm.length <= 24 ? nm : nm.slice(0, 23) + '…';
      ctx.fillText(`[${sid}] ${disp}`, p.x + 8, p.y + HDR_H / 2 + 4);

      // Body bg
      ctx.fillStyle = C.bodyBg;
      ctx.fillRect(p.x, p.y + HDR_H, BOX_W, nh - HDR_H);
      ctx.strokeStyle = C.hdrOut;
      ctx.lineWidth = 1;
      ctx.strokeRect(p.x, p.y + HDR_H, BOX_W, nh - HDR_H);

      // Divider
      ctx.beginPath();
      ctx.moveTo(p.x, p.y + HDR_H);
      ctx.lineTo(p.x + BOX_W, p.y + HDR_H);
      ctx.strokeStyle = C.div;
      ctx.lineWidth = 1;
      ctx.stroke();

      // Action rows
      rows.forEach((row, i) => {
        const ry = p.y + HDR_H + i * ROW_H + ROW_H / 2 + 3;

        // Dot
        const dotColor = row.dstName ? C.arrow : C.div;
        ctx.beginPath();
        ctx.arc(p.x + 10, ry, 4, 0, Math.PI * 2);
        ctx.fillStyle = dotColor;
        ctx.fill();

        // Action name
        ctx.font = 'bold 10px Share Tech Mono, Courier New, monospace';
        ctx.fillStyle = C.actTxt;
        ctx.textAlign = 'left';
        const actDisp = row.name.length <= 16 ? row.name : row.name.slice(0, 15) + '…';
        ctx.fillText(actDisp, p.x + 20, ry + 1);

        // Destination
        if (row.dstName) {
          ctx.font = '9px Share Tech Mono, Courier New, monospace';
          ctx.fillStyle = C.dstTxt;
          const dDisp = row.dstName.length <= 12 ? row.dstName : row.dstName.slice(0, 11) + '…';
          ctx.fillText(`→${dDisp}`, p.x + 140, ry + 1);
        }

        // Sensor badge
        if (row.sensorName) {
          const sColor = row.sensorActive ? C.senOn : C.senOff;
          const sState = row.sensorActive ? 'ON' : 'OFF';
          ctx.fillStyle = '#16213e';
          ctx.fillRect(p.x + BOX_W - 80, ry - 8, 78, 16);
          ctx.strokeStyle = sColor;
          ctx.lineWidth = 1;
          ctx.strokeRect(p.x + BOX_W - 80, ry - 8, 78, 16);
          ctx.font = '8px Share Tech Mono, Courier New, monospace';
          ctx.fillStyle = sColor;
          ctx.textAlign = 'center';
          const sDisp = row.sensorName.length <= 8 ? row.sensorName : row.sensorName.slice(0, 7) + '…';
          ctx.fillText(`📡${sDisp}:${sState}`, p.x + BOX_W - 41, ry + 1);
        } else {
          ctx.font = 'italic 8px Share Tech Mono, Courier New, monospace';
          ctx.fillStyle = C.senNone;
          ctx.textAlign = 'center';
          ctx.fillText('no sensor', p.x + BOX_W - 41, ry + 1);
        }

        // Row separator
        if (i < rows.length - 1) {
          ctx.beginPath();
          ctx.moveTo(p.x + 2, p.y + HDR_H + (i + 1) * ROW_H);
          ctx.lineTo(p.x + BOX_W - 2, p.y + HDR_H + (i + 1) * ROW_H);
          ctx.strokeStyle = C.div;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      });
    });
  }

  draw();
  resetBtn.addEventListener('click', () => { autoLayout(); scale = 1; panX = 0; panY = 0; draw(); });

  // Drag & pan
  let dragName = null, dragOx = 0, dragOy = 0;
  function canvasCoords(e) {
    const r = canvas.getBoundingClientRect();
    return { x: (e.clientX - r.left - panX) / scale, y: (e.clientY - r.top - panY) / scale };
  }

  canvas.addEventListener('mousedown', e => {
    const c = canvasCoords(e);
    for (const nm of allScreenNames) {
      const p = positions[nm];
      if (!p) continue;
      const nh = nodeHeight(nm);
      if (c.x >= p.x && c.x <= p.x + BOX_W && c.y >= p.y && c.y <= p.y + nh) {
        dragName = nm; dragOx = c.x; dragOy = c.y;
        return;
      }
    }
    dragName = '__PAN__'; dragOx = e.clientX; dragOy = e.clientY;
  });

  canvas.addEventListener('mousemove', e => {
    if (!dragName) return;
    if (dragName === '__PAN__') {
      panX += e.clientX - dragOx; panY += e.clientY - dragOy;
      dragOx = e.clientX; dragOy = e.clientY;
    } else {
      const c = canvasCoords(e);
      positions[dragName].x += c.x - dragOx;
      positions[dragName].y += c.y - dragOy;
      dragOx = c.x; dragOy = c.y;
    }
    draw();
  });

  canvas.addEventListener('mouseup', () => { dragName = null; });
  canvas.addEventListener('mouseleave', () => { dragName = null; });

  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.1 : 0.9;
    const r = canvas.getBoundingClientRect();
    const mx = e.clientX - r.left, my = e.clientY - r.top;
    panX = mx - (mx - panX) * factor;
    panY = my - (my - panY) * factor;
    scale *= factor;
    draw();
  }, { passive: false });
}


// ═══════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════
buildScreensTab();
</script>
